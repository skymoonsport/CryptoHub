<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // www redirect
    if (window.location.hostname === 'cryptohubcoin.com') {
      window.location.replace('https://www.cryptohubcoin.com' + window.location.pathname + window.location.search);
    } else {
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      window.location.replace('https://www.cryptohubcoin.com' + path);
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
